    <text x="1260.0" y="481" font-size="13" fill="#FF2D4F" font-weight="700">▸</text>
    <text x="1282.0" y="481" font-size="13" letter-spacing="1.8" font-weight="700" fill="#E8E8EC">OOB / COLLABORATOR READY</text>
